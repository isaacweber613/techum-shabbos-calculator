<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Techum Shabbos Calculator — Coming Soon</title>
  <meta name="description" content="A techum Shabbos (תחום שבת) calculator. Coming soon." />
  <meta name="robots" content="noindex" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --fg: #e8e6e3;
      --muted: #9a958c;
      --accent: #c4a35a;
      --card: #1a2129;
      --border: #2a333d;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f4ef;
        --fg: #1a1814;
        --muted: #6b6560;
        --accent: #8b6914;
        --card: #fffefb;
        --border: #e4ddd2;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, color-mix(in srgb, var(--accent) 18%, transparent), transparent),
        var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    main {
      width: min(28rem, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2.25rem 1.75rem;
      text-align: center;
      box-shadow: 0 12px 40px color-mix(in srgb, #000 18%, transparent);
    }
    .he {
      font-size: 1.35rem;
      letter-spacing: 0.04em;
      color: var(--accent);
      margin: 0 0 0.35rem;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.55rem;
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    .badge {
      display: inline-block;
      margin: 0 0 1.25rem;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    p {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 1rem;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.15rem;
      border-radius: 0.55rem;
      background: var(--fg);
      color: var(--bg);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    a.btn:hover { opacity: 0.9; transform: translateY(-1px); }
    a.btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
    .note {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <p class="he" lang="he" dir="rtl">תחום שבת</p>
    <h1>Techum Shabbos Calculator</h1>
    <span class="badge">Coming soon</span>
    <p>
      Address → city → techum. A decision-support tool for measuring
      the Shabbos boundary. Not yet public — under development.
    </p>
    <a class="btn" href="https://github.com/isaacweber613/techum-shabbos-calculator" rel="noopener noreferrer">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
          -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2
          -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82
          .64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
          .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93
          -.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      View on GitHub
    </a>
    <p class="note">Draft tool — not a psak. Requires a rav (MB 399:7).</p>
  </main>
</body>
</html>
